# Default values for network-monitor

# Redis time-series storage
redis:
  enabled: true
  auth:
    enabled: true
    password: ""        # set explicitly for a stable connection URL
  architecture: standalone
  master:
    persistence:
      enabled: true
      size: 2Gi
  replica:
    replicaCount: 0
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# Entries retained per interface stream (~24h at 2s poll interval)
streamMaxlen: 43200

# Optional Grafana deployment
grafana:
  enabled: false
  persistence:
    enabled: true
    size: 1Gi
