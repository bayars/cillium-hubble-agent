# Default values for network-monitor

replicaCount: 1

image:
  repository: ghcr.io/bayars/network-monitor
  tag: latest
  pullPolicy: Always

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8000
  annotations: {}
  # loadBalancerIP: ""
  #
  # Cloud LB annotations examples:
  # GKE:
  #   cloud.google.com/load-balancer-type: "Internal"
  #   networking.gke.io/load-balancer-ip-address: "my-ip"
  # AWS:
  #   service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
  #   service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
  #   service.beta.kubernetes.io/aws-load-balancer-eip-allocations: "eipalloc-xxx"
  # Azure:
  #   service.beta.kubernetes.io/azure-load-balancer-internal: "true"
  #   service.beta.kubernetes.io/azure-pip-name: "my-pip"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Application configuration
config:
  logLevel: INFO
  demoMode: "false"
  discoveryMode: hubble
  hubbleRelayAddr: hubble-relay.kube-system.svc.cluster.local:4245
  idleTimeoutSeconds: "5"

# Probes
livenessProbe:
  initialDelaySeconds: 10
  periodSeconds: 30

readinessProbe:
  initialDelaySeconds: 5
  periodSeconds: 10

# RBAC
rbac:
  create: true

serviceAccount:
  create: true
  name: ""
  annotations: {}

# Ingress
ingress:
  enabled: false
  className: ""
  annotations: {}
  host: network-monitor.local
  tls: []

# Node selector, tolerations, affinity
nodeSelector: {}
tolerations: []
affinity: {}
