{{- if .Values.collector.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "network-monitor.fullname" . }}-collector
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "network-monitor.labels" . | nindent 4 }}
    app.kubernetes.io/component: collector
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "network-monitor.fullname" . }}-collector
  labels:
    {{- include "network-monitor.labels" . | nindent 4 }}
    app.kubernetes.io/component: collector
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "network-monitor.fullname" . }}-collector
  labels:
    {{- include "network-monitor.labels" . | nindent 4 }}
    app.kubernetes.io/component: collector
subjects:
  - kind: ServiceAccount
    name: {{ include "network-monitor.fullname" . }}-collector
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "network-monitor.fullname" . }}-collector
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "network-monitor.fullname" . }}-collector
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "network-monitor.labels" . | nindent 4 }}
    app.kubernetes.io/component: collector
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "network-monitor.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: collector
  template:
    metadata:
      labels:
        {{- include "network-monitor.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: collector
    spec:
      serviceAccountName: {{ include "network-monitor.fullname" . }}-collector
      containers:
        - name: collector
          image: "{{ .Values.collector.image.repository }}:{{ .Values.collector.image.tag }}"
          imagePullPolicy: {{ .Values.collector.image.pullPolicy }}
          env:
            - name: API_URL
              value: "http://{{ include "network-monitor.fullname" . }}.{{ .Release.Namespace }}.svc:{{ .Values.service.port }}"
            - name: NAMESPACE
              value: {{ .Values.collector.namespace | quote }}
            - name: POD_SELECTOR
              value: {{ .Values.collector.podSelector | quote }}
            - name: POLL_INTERVAL_MS
              value: {{ .Values.collector.pollIntervalMs | quote }}
            - name: EXCLUDE_IFACES
              value: {{ .Values.collector.excludeInterfaces | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.collector.logLevel | quote }}
          resources:
            {{- toYaml .Values.collector.resources | nindent 12 }}
{{- end }}
