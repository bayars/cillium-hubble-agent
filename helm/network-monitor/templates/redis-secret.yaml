{{- if and .Values.redis.enabled .Values.redis.auth.enabled .Values.redis.auth.password }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-redis-url
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: network-monitor
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  redis-url: "redis://:{{ .Values.redis.auth.password }}@{{ .Release.Name }}-redis-master.{{ .Release.Namespace }}.svc:6379/0"
{{- end }}
