---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: netmon-collector
  namespace: network-monitor
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: netmon-collector
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: netmon-collector
subjects:
  - kind: ServiceAccount
    name: netmon-collector
    namespace: network-monitor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: netmon-collector
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netmon-collector
  namespace: network-monitor
  labels:
    app: netmon-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: netmon-collector
  template:
    metadata:
      labels:
        app: netmon-collector
    spec:
      serviceAccountName: netmon-collector
      containers:
        - name: collector
          image: ghcr.io/bayars/netmon-collector:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: API_URL
              value: "http://network-monitor.network-monitor.svc:8000"
            - name: NAMESPACE
              value: "clab"
            - name: POD_SELECTOR
              value: "clabernetes/app=clabernetes"
            - name: POLL_INTERVAL_MS
              value: "2000"
            - name: EXCLUDE_IFACES
              value: "lo"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
