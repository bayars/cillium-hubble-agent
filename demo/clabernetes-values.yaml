# Clabernetes Helm values with netmon sidecar injection
# This injects the sidecar into ALL topology pods automatically

globalConfig:
  deployment:
    launcherImagePullPolicy: IfNotPresent
    extraContainers:
      - name: netmon-sidecar
        image: ghcr.io/bayars/netmon-sidecar:latest
        imagePullPolicy: IfNotPresent
        env:
          - name: API_URL
            value: "http://network-monitor.network-monitor.svc:8000"
          - name: POLL_INTERVAL_MS
            value: "2000"
          - name: EXCLUDE_IFACES
            value: "lo"
          - name: LOG_LEVEL
            value: "INFO"
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          - name: POD_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
        resources:
          requests:
            cpu: 5m
            memory: 16Mi
          limits:
            cpu: 50m
            memory: 32Mi
