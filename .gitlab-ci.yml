stages:
  - test
  - build
  - release

variables:
  PYTHON_VERSION: "3.11"
  HELM_VERSION: "3.14.0"

# ---------------------------------------------------------------------------
# Test Stage
# ---------------------------------------------------------------------------

lint:
  stage: test
  image: python:${PYTHON_VERSION}-slim
  before_script:
    - pip install uv
    - uv sync --dev
  script:
    - uv run ruff check api/ tests/

test:
  stage: test
  image: python:${PYTHON_VERSION}-slim
  before_script:
    - pip install uv
    - uv sync --dev
  script:
    - uv run pytest tests/ -v --tb=short

helm-lint:
  stage: test
  image:
    name: alpine/helm:${HELM_VERSION}
    entrypoint: [""]
  script:
    - helm lint helm/network-monitor
    - helm template test helm/network-monitor --namespace test

# ---------------------------------------------------------------------------
# Build Stage
# ---------------------------------------------------------------------------

docker-build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker build -t network-monitor:${CI_COMMIT_SHORT_SHA} .
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_MERGE_REQUEST_ID

# ---------------------------------------------------------------------------
# Release Stage (only on tags)
# ---------------------------------------------------------------------------

docker-push:
  stage: release
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    IMAGE_TAG: ${CI_REGISTRY_IMAGE}
  before_script:
    - docker login -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${CI_REGISTRY}
  script:
    - VERSION=${CI_COMMIT_TAG#v}
    - docker build
      -t ${IMAGE_TAG}:${VERSION}
      -t ${IMAGE_TAG}:${CI_COMMIT_SHORT_SHA}
      -t ${IMAGE_TAG}:latest
      .
    - docker push ${IMAGE_TAG}:${VERSION}
    - docker push ${IMAGE_TAG}:${CI_COMMIT_SHORT_SHA}
    - docker push ${IMAGE_TAG}:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

helm-push:
  stage: release
  image:
    name: alpine/helm:${HELM_VERSION}
    entrypoint: [""]
  script:
    - VERSION=${CI_COMMIT_TAG#v}
    - sed -i "s/^version:.*/version: ${VERSION}/" helm/network-monitor/Chart.yaml
    - sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" helm/network-monitor/Chart.yaml
    - helm package helm/network-monitor
    - helm registry login -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${CI_REGISTRY}
    - helm push network-monitor-${VERSION}.tgz oci://${CI_REGISTRY}/${CI_PROJECT_NAMESPACE}/charts
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - docker-push
    - helm-push
  script:
    - echo "Creating release for ${CI_COMMIT_TAG}"
  release:
    tag_name: ${CI_COMMIT_TAG}
    name: "Release ${CI_COMMIT_TAG}"
    description: "Release ${CI_COMMIT_TAG}"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
