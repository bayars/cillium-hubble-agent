stages:
  - test
  - build
  - release

variables:
  PYTHON_VERSION: "3.11"
  HELM_VERSION: "3.14.0"
  SIDECAR_IMAGE: ${CI_REGISTRY_IMAGE}/sidecar
  COLLECTOR_IMAGE: ${CI_REGISTRY_IMAGE}/collector

# ---------------------------------------------------------------------------
# Test Stage
# ---------------------------------------------------------------------------

lint:
  stage: test
  image: python:${PYTHON_VERSION}-slim
  before_script:
    - pip install uv
    - uv sync --dev
  script:
    - uv run ruff check sidecar/ tests/

test:
  stage: test
  image: python:${PYTHON_VERSION}-slim
  before_script:
    - pip install uv
    - uv sync --dev
  script:
    - uv run pytest tests/ -v --tb=short --junitxml=report.xml
  artifacts:
    when: always
    reports:
      junit: report.xml
    expire_in: 30 days

helm-lint:
  stage: test
  image:
    name: alpine/helm:${HELM_VERSION}
    entrypoint: [""]
  script:
    - helm lint helm/network-monitor
    - helm template test helm/network-monitor --namespace test

# ---------------------------------------------------------------------------
# Build Stage
# ---------------------------------------------------------------------------

.docker-base:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${CI_REGISTRY}
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_MERGE_REQUEST_ID

build-sidecar:
  extends: .docker-base
  script:
    - docker build
      -t ${SIDECAR_IMAGE}:${CI_COMMIT_SHORT_SHA}
      -f sidecar/Dockerfile .
    - docker push ${SIDECAR_IMAGE}:${CI_COMMIT_SHORT_SHA}

build-collector:
  extends: .docker-base
  script:
    - docker build
      -t ${COLLECTOR_IMAGE}:${CI_COMMIT_SHORT_SHA}
      -f sidecar/Dockerfile.collector .
    - docker push ${COLLECTOR_IMAGE}:${CI_COMMIT_SHORT_SHA}

# ---------------------------------------------------------------------------
# Release Stage (only on tags matching vX.Y.Z)
# ---------------------------------------------------------------------------

.release-docker:
  stage: release
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${CI_REGISTRY}
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

push-sidecar:
  extends: .release-docker
  script:
    - VERSION=${CI_COMMIT_TAG#v}
    - docker build
      -t ${SIDECAR_IMAGE}:${VERSION}
      -t ${SIDECAR_IMAGE}:${CI_COMMIT_SHORT_SHA}
      -t ${SIDECAR_IMAGE}:latest
      -f sidecar/Dockerfile .
    - docker push ${SIDECAR_IMAGE}:${VERSION}
    - docker push ${SIDECAR_IMAGE}:${CI_COMMIT_SHORT_SHA}
    - docker push ${SIDECAR_IMAGE}:latest

push-collector:
  extends: .release-docker
  script:
    - VERSION=${CI_COMMIT_TAG#v}
    - docker build
      -t ${COLLECTOR_IMAGE}:${VERSION}
      -t ${COLLECTOR_IMAGE}:${CI_COMMIT_SHORT_SHA}
      -t ${COLLECTOR_IMAGE}:latest
      -f sidecar/Dockerfile.collector .
    - docker push ${COLLECTOR_IMAGE}:${VERSION}
    - docker push ${COLLECTOR_IMAGE}:${CI_COMMIT_SHORT_SHA}
    - docker push ${COLLECTOR_IMAGE}:latest

helm-push:
  stage: release
  image:
    name: alpine/helm:${HELM_VERSION}
    entrypoint: [""]
  script:
    - VERSION=${CI_COMMIT_TAG#v}
    - sed -i "s/^version:.*/version: ${VERSION}/" helm/network-monitor/Chart.yaml
    - sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" helm/network-monitor/Chart.yaml
    - helm package helm/network-monitor
    - helm registry login -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${CI_REGISTRY}
    - helm push network-monitor-${VERSION}.tgz oci://${CI_REGISTRY}/${CI_PROJECT_NAMESPACE}/charts
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - push-sidecar
    - push-collector
    - helm-push
  script:
    - echo "Creating release for ${CI_COMMIT_TAG}"
  release:
    tag_name: ${CI_COMMIT_TAG}
    name: "Release ${CI_COMMIT_TAG}"
    description: "Release ${CI_COMMIT_TAG}"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
