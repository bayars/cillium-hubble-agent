---
# =============================================================================
# Option 1: Clabernetes extraContainers (RECOMMENDED)
# =============================================================================
# Set in your Clabernetes Helm values to inject the sidecar into ALL topology
# pods automatically. No per-topology config needed.
#
# The sidecar shares the pod's network namespace, so it sees every interface
# (linecards, CPM, mgmt, etc.) and captures ALL traffic — ping, ssh, scp,
# routing protocols, iperf3, anything that touches the kernel network stack.
#
# helm upgrade clabernetes charts/clabernetes \
#   -f clabernetes-values.yaml
#
# --- clabernetes-values.yaml ---
# globalConfig:
#   deployment:
#     extraContainers:
#       - name: netmon-sidecar
#         image: ghcr.io/bayars/netmon-sidecar:latest
#         env:
#           - name: API_URL
#             value: "http://network-monitor.network-monitor.svc:8000"
#           - name: POLL_INTERVAL_MS
#             value: "2000"
#           - name: EXCLUDE_IFACES
#             value: "lo"
#           - name: POD_NAME
#             valueFrom:
#               fieldRef:
#                 fieldPath: metadata.name
#           - name: POD_NAMESPACE
#             valueFrom:
#               fieldRef:
#                 fieldPath: metadata.namespace
#         resources:
#           requests:
#             cpu: 5m
#             memory: 16Mi
#           limits:
#             cpu: 50m
#             memory: 32Mi
#
# monitoring:
#   podMonitor:
#     enabled: true
#     interval: 15s

---
# =============================================================================
# Option 2: Standalone Deployment (for non-Clabernetes environments)
# =============================================================================
# If you control the pod spec directly (regular Deployments, StatefulSets),
# add the sidecar container alongside your application container.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-network-device
  namespace: my-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-network-device
  template:
    metadata:
      labels:
        app: my-network-device
    spec:
      containers:
        # Your main application container
        - name: network-device
          image: quay.io/frrouting/frr:9.1.0

        # Netmon sidecar — shares network namespace, reads kernel counters
        - name: netmon-sidecar
          image: ghcr.io/bayars/netmon-sidecar:latest
          env:
            - name: API_URL
              value: "http://network-monitor.network-monitor.svc:8000"
            - name: POLL_INTERVAL_MS
              value: "2000"
            - name: EXCLUDE_IFACES
              value: "lo"
            # Auto-detect node_id from Kubernetes downward API
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
