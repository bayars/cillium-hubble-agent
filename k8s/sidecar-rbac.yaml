---
# ServiceAccount for the network monitor sidecar.
# Apply this in each namespace where Clabernetes topologies run.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: netmon-sidecar
  namespace: default   # change to match the topology namespace
---
# Namespace-scoped Role: read Connectivity CRs only.
# The sidecar only needs to read its own topology's CR.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: netmon-sidecar
  namespace: default   # change to match the topology namespace
rules:
  - apiGroups: ["clabernetes.containerlab.dev"]
    resources: ["connectivities"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: netmon-sidecar
  namespace: default   # change to match the topology namespace
subjects:
  - kind: ServiceAccount
    name: netmon-sidecar
    namespace: default  # change to match the topology namespace
roleRef:
  kind: Role
  name: netmon-sidecar
  apiGroup: rbac.authorization.k8s.io
